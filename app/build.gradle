plugins {
    id 'com.android.application'
}

android {
    namespace 'com.miui.home'
    compileSdk 34

    defaultConfig {
        applicationId "com.miui.home"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
}
