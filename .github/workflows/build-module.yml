name: HLB Build Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Redirector APK
        run: ./gradlew assembleRelease

      - name: Prepare Magisk Module Structure
        run: |
          # Create a temporary staging directory
          mkdir -p output/system/priv-app/MiuiHome
          
          # 1. Copy the compiled APK from the build folder to the Magisk structure
          # We rename it to MiuiHome.apk so it correctly replaces the system launcher
          cp app/build/outputs/apk/release/*.apk output/system/priv-app/MiuiHome/MiuiHome.apk
          
          # 2. Copy Magisk configuration and scripts
          cp magisk_template/module.prop output/
          cp magisk_template/service.sh output/
          
          # 3. Ensure scripts have correct Unix line endings and permissions
          chmod +x output/service.sh

      - name: Zip Flashable Module
        run: |
          cd output
          zip -r ../HLB_Gesture_Bypass_v1.0.zip .
          cd ..

      - name: Upload Flashable Module Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HLB-Magisk-Module
          path: HLB_Gesture_Bypass_v1.0.zip