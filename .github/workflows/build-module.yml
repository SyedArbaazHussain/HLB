name: HLB Build Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bootstrap Gradle Wrapper
        run: |
          # Download the Gradle distribution to generate the wrapper files
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          # Use the downloaded gradle to generate the local wrapper structure
          ./gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          # Ensure the generated gradlew is executable
          chmod +x gradlew

      - name: Build Redirector APK
        run: ./gradlew assembleRelease

      - name: Prepare Magisk Module Structure
        run: |
          mkdir -p output/system/priv-app/MiuiHome
          
          # Copy compiled APK
          cp app/build/outputs/apk/release/*.apk output/system/priv-app/MiuiHome/MiuiHome.apk
          
          # Copy Magisk template files
          cp magisk_template/module.prop output/
          cp magisk_template/service.sh output/
          
          # Fix permissions for the Magisk boot script
          chmod +x output/service.sh

      - name: Zip Flashable Module
        run: |
          cd output
          zip -r ../HLB_Gesture_Bypass_v1.0.zip .
          cd ..

      - name: Upload Flashable Module Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HLB-Magisk-Module
          path: HLB_Gesture_Bypass_v1.0.zip